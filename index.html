<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radar — Encontrá gente cerca tuyo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0f1a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }

    .logo {
      font-size: 52px;
      font-weight: 900;
      font-style: italic;
      letter-spacing: -2px;
      color: #4ecdc4;
      margin-bottom: 16px;
    }

    .tagline {
      font-size: 18px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 56px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 280px;
    }

    .link-btn {
      display: block;
      padding: 14px 24px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .link-btn:hover { opacity: 0.85; }

    .link-primary {
      background: #4ecdc4;
      color: #0a0f1a;
    }

    .link-secondary {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.12);
    }

    footer {
      margin-top: 64px;
      color: rgba(255,255,255,0.2);
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div class="logo">Radar</div>
  <p class="tagline">Encontrá gente cerca tuyo</p>

  <div class="links">
    <a class="link-btn link-primary" href="privacy.html">Política de Privacidad</a>
    <a class="link-btn link-secondary" href="terms.html">Términos de Uso</a>
    <a class="link-btn link-secondary" href="support.html">Soporte</a>
  </div>

  <footer>© 2025 Radar · Todos los derechos reservados</footer>

</body>
</html>
